<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Fan Passport avatar</title>
  <desc id="desc">A football fan passport mark for the Fan Passport project.</desc>
  <defs>
    <linearGradient id="cover" x1="232" y1="162" x2="790" y2="858" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f6152"/>
      <stop offset="58%" stop-color="#073a34"/>
      <stop offset="100%" stop-color="#021f1e"/>
    </linearGradient>
    <linearGradient id="foil" x1="250" y1="192" x2="780" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff2b4"/>
      <stop offset="35%" stop-color="#e0ae42"/>
      <stop offset="70%" stop-color="#79f09a"/>
      <stop offset="100%" stop-color="#6dbdff"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1a352f"/>
      <stop offset="64%" stop-color="#0a1110"/>
      <stop offset="100%" stop-color="#030504"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#030504"/>
  <circle cx="512" cy="512" r="458" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="452" fill="none" stroke="url(#foil)" stroke-width="20"/>

  <g filter="url(#shadow)">
    <path d="M280 180h370c62 0 112 50 112 112v556H374c-52 0-94-42-94-94z" fill="url(#cover)"/>
    <path d="M374 848h388v-90H374c-52 0-94 20-94 45s42 45 94 45z" fill="#f6f0d5"/>
    <path d="M374 780h388" stroke="#d6c9a2" stroke-width="10"/>
    <path d="M342 206v562" stroke="#f2c85b" stroke-width="12" stroke-opacity="0.72"/>
    <path d="M724 292v410" stroke="#e8d38a" stroke-width="8" stroke-opacity="0.34"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="386" y="260" width="276" height="342" rx="34" fill="#f9f0d2"/>
    <rect x="414" y="286" width="220" height="54" rx="14" fill="#082621"/>
    <circle cx="524" cy="434" r="86" fill="#0b322c"/>
    <circle cx="524" cy="434" r="58" fill="#f8fbef"/>
    <path d="M524 394l38 28-15 45h-46l-15-45z" fill="#071312"/>
    <path d="M414 536h220M414 566h166" stroke="#0b322c" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
  </g>

  <g filter="url(#glow)" fill="none" stroke="url(#foil)" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="512" cy="512" r="250" stroke-width="14" stroke-dasharray="24 26"/>
    <path d="M314 704c92-52 171-55 236-8 48 35 104 35 168-1" stroke-width="20"/>
    <path d="M654 664l56 56 92-110" stroke-width="30"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="702" cy="274" r="86" fill="#071312" stroke="url(#foil)" stroke-width="14"/>
    <path d="M664 274h76M702 236v76" stroke="#f5e2a0" stroke-width="18" stroke-linecap="round"/>
    <circle cx="702" cy="274" r="50" fill="none" stroke="#76ef99" stroke-width="6" stroke-dasharray="12 14"/>
  </g>
</svg>
